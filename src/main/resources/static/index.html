<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tasks App</title>
</head>
<body>

<h1>Tasks</h1>

<input id="taskTitle" placeholder="Task title">
<input id="taskDesc" placeholder="Description">
<select id="taskType">
    <option value="TASK">Task</option>
    <option value="NOTE">Note</option>
    <option value="THOUGHT">Thought</option>
</select>
<div id="tagCheckboxes"></div>
<button onclick="createTask()">Add</button>

<ul id="taskList"></ul>

<h1>Tags</h1>

<input id="tagName" placeholder="Tag name">
<button onclick="createTag()">Add Tag</button>

<ul id="tagList"></ul>

<script>
    async function loadTasks() {
        const res = await fetch('/tasks');
        const tasks = await res.json();

        const list = document.getElementById('taskList');
        list.innerHTML = '';

        tasks.forEach(task => {
            const li = document.createElement('li');
            li.innerText = task.title + " (" + task.type +") " + " - " + task.description;

            const delBtn = document.createElement('button');
            delBtn.innerText = 'Delete';
            delBtn.onclick = () => deleteTask(task.id);

            li.appendChild(delBtn);
            list.appendChild(li);
        });
    }

    async function createTask() {
        const title = document.getElementById('taskTitle').value;
        const description = document.getElementById('taskDesc').value;
        const type = document.getElementById('taskType').value;
        const tagIds = [...document.querySelectorAll('#tagCheckboxes input:checked')]
        .map(cb => Number(cb.value));

        await fetch('/tasks', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ title, description, type, tagIds })
        });

        document.querySelectorAll('#tagCheckboxes input[type=checkbox]')
        .forEach(cb => cb.checked = false);

        loadTasks();
    }

    async function deleteTask(id) {
        await fetch('/tasks/' + id, {
            method: 'DELETE'
        });

        loadTasks();
    }

        async function loadTags() {
    const res = await fetch('/tags');
    const tags = await res.json();

    const list = document.getElementById('tagList');
    list.innerHTML = '';

    tags.forEach(tag => {
        const li = document.createElement('li');

        li.innerText = tag.name;

        const delBtn = document.createElement('button');
        delBtn.innerText = 'Delete';
        delBtn.onclick = () => deleteTag(tag.id);

        li.appendChild(delBtn);
        list.appendChild(li);
    });
    }

    async function createTag() {
    const name = document.getElementById('tagName').value;

    await fetch('/tags', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
    });

    loadTags();
    loadTagCheckboxes();
    }


    async function deleteTag(id) {
    await fetch('/tags/' + id, {
        method: 'DELETE'
    });

    loadTags();
    loadTagCheckboxes();
    }

    async function loadTagCheckboxes() {
    const res = await fetch('/tags');
    const tags = await res.json();

    const container = document.getElementById('tagCheckboxes');
    container.innerHTML = '';

    tags.forEach(tag => {
        const label = document.createElement('label');
        label.innerHTML = `<input type="checkbox" value="${tag.id}"> ${tag.name}`;
        container.appendChild(label);
    });
    }

    loadTasks();
    loadTags();
    loadTagCheckboxes();
</script>

</body>
</html>
